{% extends 'base.html' %}
{% load static %}

{% block title %}Tạo lịch quét{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/admin/admin.css' %}">
{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1>Tạo lịch quét</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Chủ đề điểm danh</label>
                {{ form.topic_name }}
            </div>
            <div class="form-group">
                <label>Ngày tháng </label>
                {{ form.scan_date }}
            </div>
            <div class="form-group">
                <label>Mật khẩu </label>
                {{ form.scan_password }}
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                {{ form.is_active }}
            </div>

            <div class="action-row">
                <a href="{% url 'attendance:dashboard' %}" class="btn btn-secondary">Quay lại</a>
                <button type="submit" class="btn btn-primary">Lưu lịch quét</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
